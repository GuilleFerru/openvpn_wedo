services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: docker-socket-proxy
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Only allow what openvpn-admin needs: create/run/restart containers
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
      DELETE: 1   # needed for docker run --rm to remove ephemeral containers
      EXEC: 1
    # Bind only to internal network — not exposed outside
    networks:
      - admin_net

  openvpn:
    image: kylemanna/openvpn
    container_name: openvpn
    restart: always
    ports:
      - "1194:1194/udp"
    cap_add:
      - NET_ADMIN
    volumes:
      - openvpn_openvpn_data:/etc/openvpn
      - ./ccd:/etc/openvpn/ccd
    sysctls:
      - net.ipv4.ip_forward=1
    command: >
      sh -c "
        iptables -F FORWARD;
        iptables -P FORWARD DROP;
        iptables -A FORWARD -m state --state ESTABLISHED,RELATED -j ACCEPT;
        iptables -A FORWARD -i tun0 -o tun0 -m iprange --src-range 10.8.0.1-10.8.0.254 -j ACCEPT;
        iptables -A FORWARD -i tun0 -o tun0 -j DROP;
        iptables -A FORWARD -i tun0 -o eth0 -j ACCEPT;
        iptables -A FORWARD -i eth0 -o tun0 -m state --state ESTABLISHED,RELATED -j ACCEPT;
        ovpn_run
      "

  openvpn-admin:
    build: ./admin
    container_name: openvpn-admin
    restart: always
    # Port NOT exposed directly — all access goes through Traefik (HTTPS)
    # Routing definido en traefik-dynamic.yml (file provider, no labels)
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - LOCAL_SERVER_IP=${LOCAL_SERVER_IP:-}
      - VOLUME_NAME=${VOLUME_NAME:-openvpn_openvpn_data}
      # Route Docker CLI through the filtered proxy (no raw socket access)
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    volumes:
      - ./clients:/app/clients
      - ./ccd:/app/ccd
    depends_on:
      - openvpn
      - docker-socket-proxy
    networks:
      - admin_net
      - default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  traefik:
    image: traefik:v3.4
    container_name: traefik
    restart: always
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    environment:
      # Sustituida en traefik-dynamic.yml mediante {{env "DOMAIN"}}
      - DOMAIN=${DOMAIN}
    command:
      # File provider en vez de Docker provider — evita bug de API version
      # con Docker Engine >= 27 (Traefik hardcodea /v1.24/ y el daemon lo rechaza)
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    volumes:
      - ./traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_letsencrypt:/letsencrypt
    depends_on:
      - openvpn-admin

volumes:
  openvpn_openvpn_data:
    external: true
  traefik_letsencrypt:
    external: true

networks:
  admin_net:
    # Internal network shared only by docker-socket-proxy and openvpn-admin
    internal: true
  default:
