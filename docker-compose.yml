services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: docker-socket-proxy
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Only allow what openvpn-admin needs: create/run/restart containers
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
      DELETE: 1   # needed for docker run --rm to remove ephemeral containers
      EXEC: 1
    # Bind only to internal network — not exposed outside
    networks:
      - admin_net

  openvpn:
    image: kylemanna/openvpn
    container_name: openvpn
    restart: always
    # network_mode: host — necesario para que tun0 (daemon1) y tun1 (daemon2)
    # vivan en el netns del host y el kernel pueda rutear entre ambas subnets
    # (10.8/16 <-> 10.9/16). Las reglas iptables las maneja
    # infra/scripts/openvpn-iptables.sh en el host (chain OPENVPN_FWD).
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - openvpn_openvpn_data:/etc/openvpn
      - ./ccd:/etc/openvpn/ccd
    command: ovpn_run --config /etc/openvpn/openvpn.conf

  openvpn-modern:
    # Segundo daemon para clientes OpenVPN 2.5+ (UG63v2 y futuros) que no
    # soportan comp-lzo. PKI compartida con daemon1 (mismo volumen), subnet
    # 10.9.0.0/16, puerto 1195, tun1. Ver docs/plan_2_daemons_ug63.md.
    image: kylemanna/openvpn
    container_name: openvpn-modern
    restart: always
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - openvpn_openvpn_data:/etc/openvpn
      - ./ccd-modern:/etc/openvpn/ccd-modern
    command: ovpn_run --config /etc/openvpn/openvpn-modern.conf --client-config-dir /etc/openvpn/ccd-modern

  openvpn-admin:
    build: ./admin
    container_name: openvpn-admin
    restart: always
    # Port NOT exposed directly — all access goes through Traefik (HTTPS)
    # Routing definido en traefik-dynamic.yml (file provider, no labels)
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - LOCAL_SERVER_IP=${LOCAL_SERVER_IP:-}
      - VOLUME_NAME=${VOLUME_NAME:-openvpn_openvpn_data}
      # Route Docker CLI through the filtered proxy (no raw socket access)
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    volumes:
      - ./clients:/app/clients
      - ./ccd:/app/ccd
    depends_on:
      - openvpn
      - openvpn-modern
      - docker-socket-proxy
    networks:
      - admin_net
      - default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  traefik:
    image: traefik:v3.4
    container_name: traefik
    restart: always
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    environment:
      # Sustituida en traefik-dynamic.yml mediante {{env "DOMAIN"}}
      - DOMAIN=${DOMAIN}
    command:
      # File provider en vez de Docker provider — evita bug de API version
      # con Docker Engine >= 27 (Traefik hardcodea /v1.24/ y el daemon lo rechaza)
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    volumes:
      - ./traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_letsencrypt:/letsencrypt
    depends_on:
      - openvpn-admin

volumes:
  openvpn_openvpn_data:
    external: true
  traefik_letsencrypt:
    external: true

networks:
  admin_net:
    # Internal network shared only by docker-socket-proxy and openvpn-admin
    internal: true
  default:
