<!doctype html>
<html>
  <head>
    <title>WeDo VPN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23ee7623'/><text y='.88em' font-size='70' text-anchor='middle' x='50'>V</text></svg>" />
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body class="login-page">
    <div class="login-box">
      <div class="login-header">
        <div class="login-wordmark">WeDo <span>VPN</span></div>
        <div class="login-sub">Panel de Administración</div>
      </div>
      <div class="login-body">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          <input
            type="password"
            name="password"
            placeholder="Contraseña"
            required
            autofocus
          />
          <button type="submit">Ingresar</button>
        </form>
        {% if error %}
        <p class="login-error">{{ error }}</p>
        {% endif %}
      </div>
    </div>
  </body>
</html>
